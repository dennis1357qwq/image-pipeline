
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Image pipeline</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f3;
      color: #1a1a18;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem 1rem;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    header h1 {
      font-size: 1.5rem;
      font-weight: 500;
      letter-spacing: -0.02em;
      color: #1a1a18;
    }

    header p {
      font-size: 0.875rem;
      color: #6b6b67;
      margin-top: 0.35rem;
    }

    .card {
      background: #fff;
      border: 0.5px solid #d8d8d4;
      border-radius: 14px;
      padding: 1.75rem;
      width: 100%;
      max-width: 560px;
    }

    .card + .card { margin-top: 1.25rem; }

    .section-label {
      font-size: 0.75rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: #888884;
      margin-bottom: 1rem;
    }

    .drop-zone {
      border: 1.5px dashed #d0d0cc;
      border-radius: 10px;
      padding: 2.5rem 1rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      position: relative;
    }

    .drop-zone:hover, .drop-zone.dragover {
      border-color: #888884;
      background: #fafaf8;
    }

    .drop-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .drop-icon {
      font-size: 2rem;
      color: #c0c0bc;
      margin-bottom: 0.5rem;
    }

    .drop-zone p {
      font-size: 0.875rem;
      color: #888884;
    }

    .drop-zone p strong {
      color: #1a1a18;
      font-weight: 500;
    }

    .preview-wrap {
      margin-top: 1rem;
      display: none;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem;
      background: #f5f5f3;
      border-radius: 8px;
    }

    .preview-wrap.visible { display: flex; }

    .preview-wrap img {
      width: 48px;
      height: 48px;
      object-fit: cover;
      border-radius: 6px;
      border: 0.5px solid #d8d8d4;
    }

    .preview-wrap span {
      font-size: 0.875rem;
      color: #444441;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .preview-wrap button {
      background: none;
      border: none;
      cursor: pointer;
      color: #888884;
      font-size: 1.1rem;
      padding: 0.2rem;
      line-height: 1;
    }

    .ops {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.625rem;
      margin-top: 0;
    }

    .op-btn {
      border: 0.5px solid #d8d8d4;
      border-radius: 8px;
      background: #fff;
      padding: 0.75rem 0.5rem;
      cursor: pointer;
      text-align: center;
      transition: border-color 0.12s, background 0.12s;
    }

    .op-btn:hover { background: #fafaf8; border-color: #aaa; }

    .op-btn.selected {
      border-color: #1a1a18;
      background: #1a1a18;
      color: #fff;
    }

    .op-btn .op-icon {
      font-size: 1.25rem;
      display: block;
      margin-bottom: 0.3rem;
      color: inherit;
    }

    .op-btn .op-label {
      font-size: 0.8rem;
      font-weight: 500;
    }

    .submit-btn {
      width: 100%;
      margin-top: 1.25rem;
      padding: 0.8rem;
      border-radius: 8px;
      border: none;
      background: #1a1a18;
      color: #fff;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .submit-btn:not(:disabled):hover { opacity: 0.85; }

    .status-wrap {
      display: none;
      align-items: center;
      gap: 0.75rem;
      padding: 1rem 1.25rem;
      background: #f5f5f3;
      border-radius: 10px;
    }

    .status-wrap.visible { display: flex; }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid #d0d0cc;
      border-top-color: #1a1a18;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .status-text { font-size: 0.875rem; color: #444441; }
    .status-id { font-size: 0.75rem; color: #888884; margin-top: 0.15rem; font-family: monospace; }

    .result-section { display: none; }
    .result-section.visible { display: block; }

    .result-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-top: 0.75rem;
    }

    .result-img-wrap { position: relative; }

    .result-img-wrap img {
      width: 100%;
      border-radius: 8px;
      border: 0.5px solid #d8d8d4;
      display: block;
    }

    .img-label {
      font-size: 0.75rem;
      color: #888884;
      margin-bottom: 0.4rem;
    }

    .download-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      width: 100%;
      margin-top: 1.25rem;
      padding: 0.7rem;
      border-radius: 8px;
      border: 0.5px solid #d8d8d4;
      background: #fff;
      color: #1a1a18;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.12s;
    }

    .download-btn:hover { background: #f5f5f3; }

    .error-msg {
      display: none;
      padding: 0.75rem 1rem;
      background: #fff5f5;
      border: 0.5px solid #fca5a5;
      border-radius: 8px;
      font-size: 0.875rem;
      color: #991b1b;
      margin-top: 0.75rem;
    }

    .error-msg.visible { display: block; }

    .done-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.75rem;
      font-weight: 500;
      padding: 3px 10px;
      border-radius: 20px;
      background: #dcfce7;
      color: #166534;
    }

    .reset-btn {
      display: block;
      margin: 1rem auto 0;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 0.875rem;
      color: #888884;
      text-decoration: underline;
    }

    .reset-btn:hover { color: #1a1a18; }
  </style>
</head>
<body>

<header>
  <h1>Image pipeline</h1>
  <p>Upload an image, pick a transformation, get the result.</p>
</header>

<div class="card" id="upload-card">
  <div class="section-label">1 — Choose an image</div>

  <div class="drop-zone" id="drop-zone">
    <input type="file" id="file-input" accept="image/*" />
    <div class="drop-icon">&#8679;</div>
    <p><strong>Click to upload</strong> or drag and drop</p>
    <p>PNG, JPG, WEBP supported</p>
  </div>

  <div class="preview-wrap" id="preview-wrap">
    <img id="preview-img" src="" alt="preview" />
    <span id="preview-name"></span>
    <button id="clear-btn" title="Remove file">&#10005;</button>
  </div>

  <div class="section-label" style="margin-top: 1.5rem;">2 — Pick a transformation</div>

  <div class="ops">
    <button class="op-btn selected" data-op="grayscale">
      <span class="op-icon">&#9681;</span>
      <span class="op-label">Grayscale</span>
    </button>
    <button class="op-btn" data-op="thumbnail">
      <span class="op-icon">&#9633;</span>
      <span class="op-label">Thumbnail</span>
    </button>
    <button class="op-btn" data-op="blur">
      <span class="op-icon">&#9685;</span>
      <span class="op-label">Blur</span>
    </button>
  </div>

  <div class="status-wrap" id="status-wrap">
    <div class="spinner" id="spinner"></div>
    <div>
      <div class="status-text" id="status-text">Submitting job...</div>
      <div class="status-id" id="status-id"></div>
    </div>
  </div>

  <div class="error-msg" id="error-msg"></div>

  <button class="submit-btn" id="submit-btn" disabled>Process image</button>
</div>

<div class="card result-section" id="result-section">
  <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom: 1rem;">
    <div class="section-label" style="margin-bottom:0;">Result</div>
    <span class="done-badge">&#10003; Done</span>
  </div>

  <div class="result-grid">
    <div class="result-img-wrap">
      <div class="img-label">Original</div>
      <img id="original-img" src="" alt="Original image" />
    </div>
    <div class="result-img-wrap">
      <div class="img-label" id="result-label">Processed</div>
      <img id="result-img" src="" alt="Processed image" />
    </div>
  </div>

  <a class="download-btn" id="download-btn" href="#" download="result.jpg">
    &#8681; Download processed image
  </a>

  <button class="reset-btn" id="reset-btn">Process another image</button>
</div>

<script>
  const API = 'http://localhost:8000';

  const fileInput = document.getElementById('file-input');
  const dropZone = document.getElementById('drop-zone');
  const previewWrap = document.getElementById('preview-wrap');
  const previewImg = document.getElementById('preview-img');
  const previewName = document.getElementById('preview-name');
  const clearBtn = document.getElementById('clear-btn');
  const submitBtn = document.getElementById('submit-btn');
  const statusWrap = document.getElementById('status-wrap');
  const statusText = document.getElementById('status-text');
  const statusId = document.getElementById('status-id');
  const spinner = document.getElementById('spinner');
  const errorMsg = document.getElementById('error-msg');
  const resultSection = document.getElementById('result-section');
  const originalImg = document.getElementById('original-img');
  const resultImg = document.getElementById('result-img');
  const resultLabel = document.getElementById('result-label');
  const downloadBtn = document.getElementById('download-btn');
  const resetBtn = document.getElementById('reset-btn');

  let selectedFile = null;
  let selectedOp = 'grayscale';
  let pollTimer = null;

  document.querySelectorAll('.op-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.op-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      selectedOp = btn.dataset.op;
    });
  });

  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) setFile(file);
  });

  fileInput.addEventListener('change', () => {
    if (fileInput.files[0]) setFile(fileInput.files[0]);
  });

  clearBtn.addEventListener('click', () => {
    selectedFile = null;
    fileInput.value = '';
    previewWrap.classList.remove('visible');
    submitBtn.disabled = true;
  });

  function setFile(file) {
    selectedFile = file;
    previewName.textContent = file.name;
    const reader = new FileReader();
    reader.onload = e => { previewImg.src = e.target.result; };
    reader.readAsDataURL(file);
    previewWrap.classList.add('visible');
    submitBtn.disabled = false;
    hideError();
  }

  submitBtn.addEventListener('click', async () => {
    if (!selectedFile) return;
    hideError();
    setLoading(true, 'Uploading image...');

    const form = new FormData();
    form.append('file', selectedFile);
    form.append('operation', selectedOp);

    let jobId;
    try {
      const res = await fetch(`${API}/jobs`, { method: 'POST', body: form });
      if (!res.ok) {
        const txt = await res.text();
        throw new Error(`Server returned ${res.status}: ${txt}`);
      }
      const data = await res.json();
      jobId = typeof data === 'string' ? data : (data.job_id || data.id || data.jobId);
      if (!jobId) throw new Error('No job ID in response: ' + JSON.stringify(data));
    } catch (err) {
      showError('Could not submit job. Is the API running at localhost:8000?\n' + err.message);
      setLoading(false);
      return;
    }

    statusId.textContent = 'Job ID: ' + jobId;
    setLoading(true, 'Processing...');
    originalImg.src = previewImg.src;
    poll(jobId);
  });

  function poll(jobId) {
    clearTimeout(pollTimer);
    pollTimer = setTimeout(async () => {
      try {
        const res = await fetch(`${API}/jobs/${jobId}`);
        if (!res.ok) throw new Error(`Status check failed: ${res.status}`);
        const data = await res.json();
        const status = (data.status || '').toLowerCase();

        if (status === 'done' || status === 'completed') {
          await showResult(jobId);
        } else if (status === 'failed' || status === 'error') {
          showError('Job failed on the server. Check worker logs for details.');
          setLoading(false);
        } else {
          setLoading(true, `Status: ${status}...`);
          poll(jobId);
        }
      } catch (err) {
        showError('Error checking job status: ' + err.message);
        setLoading(false);
      }
    }, 1000);
  }

  async function showResult(jobId) {
    try {
      const res = await fetch(`${API}/jobs/${jobId}/result`);
      if (!res.ok) throw new Error(`Result fetch failed: ${res.status}`);
      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      resultImg.src = url;
      resultLabel.textContent = selectedOp.charAt(0).toUpperCase() + selectedOp.slice(1);
      downloadBtn.href = url;
      downloadBtn.download = `result-${selectedOp}.jpg`;
      setLoading(false);
      resultSection.classList.add('visible');
      resultSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
    } catch (err) {
      showError('Could not fetch result image: ' + err.message);
      setLoading(false);
    }
  }

  function setLoading(on, text) {
    submitBtn.disabled = on;
    statusWrap.classList.toggle('visible', on);
    if (text) statusText.textContent = text;
    if (!on) statusId.textContent = '';
  }

  function showError(msg) {
    errorMsg.textContent = msg;
    errorMsg.classList.add('visible');
  }

  function hideError() {
    errorMsg.classList.remove('visible');
  }

  resetBtn.addEventListener('click', () => {
    clearTimeout(pollTimer);
    selectedFile = null;
    fileInput.value = '';
    previewWrap.classList.remove('visible');
    submitBtn.disabled = true;
    statusWrap.classList.remove('visible');
    resultSection.classList.remove('visible');
    hideError();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });
</script>

</body>
</html>
